<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UAZ'25 - Giriş Kodu</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="style.css">
    
    <!-- QR Code Library -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="media/logo.png">
    <link rel="shortcut icon" type="image/x-icon" href="media/logo.png">
    <link rel="apple-touch-icon" href="media/logo.png">
    
    <style>
        /* Sadece bu sayfa için turuncu arkaplan */
        .hero-bg {
            background: radial-gradient(circle at 30% 20%, rgba(255, 140, 66, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 70% 80%, rgba(165, 94, 31, 0.15) 0%, transparent 50%) !important;
        }
        
        .entry-card {
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            text-align: center;
        }
        
        .entry-card-content {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 60px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .entry-logo {
            margin-bottom: 40px;
        }
        
        .entry-logo img {
            width: 180px;
            height: auto;
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-5px);
            }
        }
        
        .entry-name {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #a55e1f 0%, #ff8c42 50%, #ffb347 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: fadeInUp 0.8s ease-out;
        }
        
        .entry-code-label {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 20px;
            font-weight: 500;
        }
        
        .entry-code-display {
            background: linear-gradient(135deg, #a55e1f 0%, #ff8c42 100%);
            color: #fff;
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: 8px;
            padding: 30px 40px;
            border-radius: 20px;
            margin: 20px 0 40px 0;
            box-shadow: 0 10px 30px rgba(165, 94, 31, 0.5);
            animation: pulse 2s ease-in-out infinite;
            font-family: 'Courier New', monospace;
        }
        
        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 10px 30px rgba(165, 94, 31, 0.5);
            }
            50% {
                transform: scale(1.005);
                box-shadow: 0 12px 35px rgba(255, 140, 66, 0.6);
            }
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .entry-message {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.6;
            margin-bottom: 30px;
        }
        
        .qr-code-container {
            margin: 40px 0;
        }
        
        .qr-code-label {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 20px;
            font-weight: 500;
        }
        
        .qr-code-box {
            background: white;
            padding: 20px;
            border-radius: 20px;
            display: inline-block;
            border: 3px solid #a55e1f;
            box-shadow: 0 10px 30px rgba(165, 94, 31, 0.3);
        }
        
        .qr-code-box canvas {
            display: block;
            border-radius: 10px;
        }
        
        .qr-code-hint {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 15px;
        }
        
        .entry-icon {
            font-size: 3rem;
            margin-bottom: 20px;
            color: #a55e1f;
            animation: fadeInUp 0.6s ease-out;
        }
        
        .no-data {
            text-align: center;
            padding: 60px 40px;
        }
        
        .no-data-icon {
            font-size: 4rem;
            color: rgba(255, 255, 255, 0.3);
            margin-bottom: 20px;
        }
        
        .no-data-message {
            font-size: 1.5rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 15px;
        }
        
        .no-data-hint {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 30px;
        }
        
        .example-code {
            background: rgba(165, 94, 31, 0.15);
            padding: 10px 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            color: #ff8c42;
            display: inline-block;
            border: 1px solid rgba(165, 94, 31, 0.3);
        }
        
        .back-button {
            display: inline-block;
            margin-top: 30px;
            padding: 15px 35px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            color: #fff;
            text-decoration: none;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .back-button:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 255, 255, 0.2);
        }
        
        .back-button i {
            margin-right: 8px;
        }
        
        /* Tablet için responsive */
        @media (max-width: 768px) {
            .entry-name {
                font-size: 2rem;
            }
            
            .entry-code-display {
                font-size: 2.2rem;
                letter-spacing: 4px;
                padding: 25px 30px;
            }
            
            .qr-code-box canvas {
                max-width: 250px;
                width: 100%;
            }
            
            .entry-card-content {
                padding: 40px 30px;
            }
        }
        
        /* Mobil için responsive */
        @media (max-width: 480px) {
            .entry-logo img {
                width: 120px;
            }
            
            .entry-name {
                font-size: 1.5rem;
            }
            
            .entry-code-display {
                font-size: 1.5rem;
                letter-spacing: 2px;
                padding: 20px 15px;
                word-break: break-all;
            }
            
            .qr-code-box {
                padding: 15px;
            }
            
            .qr-code-box canvas {
                max-width: 200px;
                width: 100%;
            }
            
            .entry-card-content {
                padding: 30px 20px;
            }
            
            .back-button {
                padding: 12px 25px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="registration-page">
        <!-- Hero Background (UAZ25 ile aynı) -->
        <div class="hero-bg"></div>
        <div class="hero-stars" id="hero-stars"></div>

        <!-- Entry Card -->
        <div class="form-container entry-card">
            <div class="entry-card-content" id="entryContent">
                <!-- JavaScript ile doldurulacak -->
            </div>
        </div>
    </div>

    <script>
        // Yıldızları oluştur (UAZ25 ile aynı)
        function createStars() {
            const starsContainer = document.getElementById('hero-stars');
            const starCount = 100;

            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'hero-star';

                // Random position
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';

                // Random size (1-3px)
                const size = Math.random() * 2 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';

                // Random animation delay
                star.style.animationDelay = Math.random() * 4 + 's';

                starsContainer.appendChild(star);
            }
        }

        // URL parametrelerini okuma
        function getURLParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                isim: params.get('isim') || params.get('name') || null,
                code: params.get('code') || params.get('kod') || null
            };
        }

        // Sayfayı doldur
        function displayEntryCard() {
            const { isim, code } = getURLParams();
            const content = document.getElementById('entryContent');
            
            // Eğer parametre yoksa
            if (!isim || !code) {
                content.innerHTML = `
                    <div class="no-data">
                        <div class="no-data-icon">
                            <i class="fas fa-qrcode"></i>
                        </div>
                        <div class="no-data-message">Geçersiz QR Kod</div>
                        <div class="no-data-hint">
                            Bu sayfa QR kod okutulduğunda otomatik olarak dolar.<br>
                            <br>
                            Test için şu formatı kullanın:<br>
                            <span class="example-code">?isim=Ahmet%20Yılmaz&code=UAZ2024001</span>
                        </div>
                        <a href="index.html" class="back-button">
                            <i class="fas fa-home"></i>
                            Ana Sayfaya Dön
                        </a>
                    </div>
                `;
                return;
            }
            
            // Parametreler varsa bilgileri göster
            content.innerHTML = `
                <div class="entry-logo">
                    <img src="media/logo.png" alt="UASK Logo">
                </div>
                
                <div class="entry-name">${isim}</div>
                
                <div class="entry-code-label">Giriş Kodu:</div>
                
                <div class="entry-code-display">${code}</div>
                
                <div class="qr-code-container">
                    <div class="qr-code-label">QR Kod</div>
                    <div class="qr-code-box" id="qrCodeBox"></div>
                    <div class="qr-code-hint">Bu QR kodu etkinlik girişinde gösterebilirsiniz</div>
                </div>
                
                <div class="entry-message">
                    <i class="fas fa-ticket-alt"></i>
                    Zirveye giriş için bu kodu veya QR kodu kullanabilirsiniz.
                </div>
                
                <a href="index.html" class="back-button">
                    <i class="fas fa-home"></i>
                    Ana Sayfaya Dön
                </a>
            `;
            
            // QR kod oluştur
            const currentUrl = window.location.origin + window.location.pathname;
            const qrUrl = `${currentUrl}?isim=${encodeURIComponent(isim)}&code=${code}`;
            
            // QR Code oluştur
            const canvas = document.createElement('canvas');
            const qrCodeBox = document.getElementById('qrCodeBox');
            
            if (typeof QRCode !== 'undefined' && QRCode.toCanvas) {
                QRCode.toCanvas(canvas, qrUrl, {
                    width: 300,
                    margin: 2,
                    color: {
                        dark: '#a55e1f',
                        light: '#ffffff'
                    }
                }).then(() => {
                    qrCodeBox.appendChild(canvas);
                }).catch(err => {
                    console.error('QR kod oluşturma hatası:', err);
                    qrCodeBox.innerHTML = '<p style="color: #ff6b6b;">QR kod oluşturulamadı</p>';
                });
            } else {
                qrCodeBox.innerHTML = '<p style="color: #ff6b6b;">QR kod kütüphanesi yüklenemedi</p>';
            }
            
            console.log('Giriş Bilgileri:', { isim, code });
        }

        // Sayfa yüklendiğinde çalıştır
        window.addEventListener('DOMContentLoaded', () => {
            createStars();
            displayEntryCard();
        });
    </script>
</body>
</html>
